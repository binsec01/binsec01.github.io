<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTPX Visualizer | Security Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .fade-out { opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.3s ease; }
        .fade-in { opacity: 1; transform: translateY(0); pointer-events: auto; transition: all 0.3s ease; }

        .sort-header { cursor: pointer; user-select: none; transition: background 0.2s; }
        .sort-header:hover { background: rgba(71, 85, 105, 0.4); }
        
        .duplicate-row { background-color: rgba(30, 41, 59, 0.5); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-full mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">HTTPX <span class="text-indigo-400">Visualizer</span></h1>
            </div>
            <div class="flex gap-2">
                <button id="btnNewUpload" class="hidden text-xs font-medium bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 rounded-md transition-all">
                    + New Upload
                </button>
                <button id="btnDemo" class="text-xs font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2 rounded-md border border-slate-700 transition-all">
                    Load Demo Data
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 lg:p-6 max-w-full mx-auto flex-1 flex flex-col gap-6">
        
        <!-- Input Section -->
        <section id="inputArea" class="grid grid-cols-1 lg:grid-cols-2 gap-6 transition-all duration-300">
            <div id="dropZone" class="border-2 border-dashed border-slate-700 bg-slate-800/50 rounded-xl p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:border-indigo-500 hover:bg-slate-800 transition-all group">
                <input type="file" id="fileInput" class="hidden" accept=".json,.txt">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-500 group-hover:text-indigo-400 mb-4 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <p class="text-slate-300 font-medium">Drag & Drop httpx JSON file</p>
                <p class="text-slate-500 text-sm mt-1">or click to browse files</p>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-slate-400 ml-1">Paste JSON / JSONL Output</label>
                <textarea id="textInput" placeholder='{"url": "https://example.com", "status_code": 200 ...}' class="flex-1 bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm mono text-indigo-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all h-32 lg:h-auto resize-none"></textarea>
                <button id="btnProcess" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 rounded-lg transition-colors">Process Data</button>
            </div>
        </section>

        <!-- Stats Dashboard -->
        <section id="statsContainer" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Visible Targets</p>
                <p id="statTotal" class="text-3xl font-bold text-white mt-1">0</p>
            </div>
            <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Unique Tech</p>
                <p id="statTech" class="text-3xl font-bold text-indigo-400 mt-1">0</p>
            </div>
            <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Success (2xx)</p>
                <p id="stat2xx" class="text-3xl font-bold text-green-400 mt-1">0</p>
            </div>
            <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Errors (4xx/5xx)</p>
                <p id="statErr" class="text-3xl font-bold text-red-400 mt-1">0</p>
            </div>
        </section>

        <!-- Filters -->
        <section id="filtersArea" class="hidden flex flex-col lg:flex-row gap-4 items-end bg-slate-800/50 p-4 rounded-xl border border-slate-700">
            <div class="flex-1 w-full">
                <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">Global Search</label>
                <input type="text" id="searchBox" placeholder="Filter by URL, Title, Server..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>
            <div class="w-full lg:w-40">
                <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">Min Length</label>
                <input type="number" id="lengthFilter" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>
            <div class="w-full lg:w-48">
                <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">Filter Tech</label>
                <select id="techFilter" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <option value="all">All Technologies</option>
                </select>
            </div>
            
            <div class="w-full lg:w-auto flex flex-col gap-3 pb-2">
                <!-- Cluster Filters -->
                <div class="flex flex-wrap gap-3 items-center">
                    <button id="btnDedup" class="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all border border-slate-600 bg-slate-700 text-slate-300 hover:bg-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                        Dedup
                    </button>
                    <div class="flex gap-3 items-center pl-2 border-l border-slate-700">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" checked class="status-check w-4 h-4 rounded border-slate-700 bg-slate-900 text-indigo-600 focus:ring-indigo-500" value="2">
                            <span class="text-xs font-medium text-slate-400 group-hover:text-slate-200 transition-colors">2xx</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" checked class="status-check w-4 h-4 rounded border-slate-700 bg-slate-900 text-indigo-600 focus:ring-indigo-500" value="3">
                            <span class="text-xs font-medium text-slate-400 group-hover:text-slate-200 transition-colors">3xx</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" checked class="status-check w-4 h-4 rounded border-slate-700 bg-slate-900 text-indigo-600 focus:ring-indigo-500" value="4">
                            <span class="text-xs font-medium text-slate-400 group-hover:text-slate-200 transition-colors">4xx</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" checked class="status-check w-4 h-4 rounded border-slate-700 bg-slate-900 text-indigo-600 focus:ring-indigo-500" value="5">
                            <span class="text-xs font-medium text-slate-400 group-hover:text-slate-200 transition-colors">5xx</span>
                        </label>
                    </div>
                </div>
                <!-- Specific Filters -->
                <div class="flex gap-3 items-center pl-2 border-l border-slate-700">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Specific:</span>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="status-check w-4 h-4 rounded border-slate-700 bg-slate-900 text-indigo-600 focus:ring-indigo-500" value="403">
                        <span class="text-xs font-medium text-slate-400 group-hover:text-slate-200 transition-colors">403</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="status-check w-4 h-4 rounded border-slate-700 bg-slate-900 text-indigo-600 focus:ring-indigo-500" value="404">
                        <span class="text-xs font-medium text-slate-400 group-hover:text-slate-200 transition-colors">404</span>
                    </label>
                </div>
            </div>
        </section>

        <!-- Table -->
        <section id="tableContainer" class="hidden overflow-x-auto rounded-xl border border-slate-700 bg-slate-800 shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-700/50 text-slate-300 text-xs font-bold uppercase tracking-widest border-b border-slate-600">
                        <th class="px-4 py-3 sort-header" data-sort="url">URL / Host <span class="sort-icon opacity-0">↕</span></th>
                        <th class="px-4 py-3 text-center sort-header" data-sort="status_code">Status <span class="sort-icon opacity-0">↕</span></th>
                        <th class="px-4 py-3 sort-header" data-sort="title">Title <span class="sort-icon opacity-0">↕</span></th>
                        <th class="px-4 py-3 sort-header" data-sort="content_length">Length <span class="sort-icon opacity-0">↕</span></th>
                        <th class="px-4 py-3 sort-header" data-sort="webserver">Web Server <span class="sort-icon opacity-0">↕</span></th>
                        <th class="px-4 py-3">Technologies</th>
                        <th class="px-4 py-3 sort-header" data-sort="final_url">Final Location <span class="sort-icon opacity-0">↕</span></th>
                    </tr>
                </thead>
                <tbody id="dataTable" class="text-sm divide-y divide-slate-700">
                    <!-- JS populated -->
                </tbody>
            </table>
        </section>

    </main>

    <script>
        let allData = [];
        let filteredData = [];
        let currentSort = { key: null, direction: 'asc' };
        let isDedupEnabled = false;
        let expandedGroups = new Set();

        const elements = {
            inputArea: document.getElementById('inputArea'),
            dropZone: document.getElementById('dropZone'),
            fileInput: document.getElementById('fileInput'),
            textInput: document.getElementById('textInput'),
            btnProcess: document.getElementById('btnProcess'),
            btnDemo: document.getElementById('btnDemo'),
            btnNewUpload: document.getElementById('btnNewUpload'),
            btnDedup: document.getElementById('btnDedup'),
            dataTable: document.getElementById('dataTable'),
            searchBox: document.getElementById('searchBox'),
            lengthFilter: document.getElementById('lengthFilter'),
            techFilter: document.getElementById('techFilter'),
            statusChecks: document.querySelectorAll('.status-check'),
            stats: {
                total: document.getElementById('statTotal'),
                tech: document.getElementById('statTech'),
                s2xx: document.getElementById('stat2xx'),
                sErr: document.getElementById('statErr')
            },
            sections: {
                stats: document.getElementById('statsContainer'),
                filters: document.getElementById('filtersArea'),
                table: document.getElementById('tableContainer')
            }
        };

        const parseInput = (raw) => {
            try {
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [parsed];
            } catch (e) {
                const lines = raw.split('\n').filter(l => l.trim() !== '');
                const results = [];
                lines.forEach(line => {
                    try { results.push(JSON.parse(line)); } catch (err) { console.error("Malformed line skipped"); }
                });
                return results;
            }
        };

        // UPDATED: Now accepts a list to reflect the visually displayed targets
        const updateStats = (displayList) => {
            const total = displayList.length;
            const uniqueTech = new Set();
            let s2xx = 0, sErr = 0;

            displayList.forEach(item => {
                if (item.tech && Array.isArray(item.tech)) {
                    item.tech.forEach(t => uniqueTech.add(t));
                }
                const code = parseInt(item.status_code);
                if (code >= 200 && code < 300) s2xx++;
                if (code >= 400) sErr++;
            });

            elements.stats.total.textContent = total.toLocaleString();
            elements.stats.tech.textContent = uniqueTech.size.toLocaleString();
            elements.stats.s2xx.textContent = s2xx.toLocaleString();
            elements.stats.sErr.textContent = sErr.toLocaleString();
        };

        const getStatusClass = (code) => {
            if (!code) return 'bg-slate-700 text-slate-400';
            const c = parseInt(code);
            if (c >= 200 && c < 300) return 'bg-green-500/20 text-green-400 border border-green-500/30';
            if (c >= 300 && c < 400) return 'bg-blue-500/20 text-blue-400 border border-blue-500/30';
            if (c >= 400 && c < 500) return 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30';
            if (c >= 500) return 'bg-red-500/20 text-red-400 border border-red-500/30';
            return 'bg-slate-700 text-slate-400';
        };

        const toggleGroup = (fingerprint) => {
            if (expandedGroups.has(fingerprint)) {
                expandedGroups.delete(fingerprint);
            } else {
                expandedGroups.add(fingerprint);
            }
            renderTable();
        };

        const renderTable = () => {
            let displayList = [...filteredData];
            
            if (isDedupEnabled) {
                const groups = new Map();
                displayList.forEach((item, index) => {
                    const fingerprint = `${item.title || 'no-title'}|${item.content_length || 0}`;
                    if (!groups.has(fingerprint)) groups.set(fingerprint, []);
                    groups.get(fingerprint).push({ item, originalIndex: index });
                });

                const finalRenderList = [];
                groups.forEach((members, fingerprint) => {
                    const primary = members[0];
                    const duplicates = members.slice(1);
                    finalRenderList.push({ ...primary.item, isPrimary: true, duplicateCount: duplicates.length, fingerprint });
                    if (expandedGroups.has(fingerprint)) {
                        duplicates.forEach(dup => { finalRenderList.push({ ...dup.item, isDuplicate: true }); });
                    }
                });
                displayList = finalRenderList;
            }

            elements.dataTable.innerHTML = displayList.map(item => {
                const isPrimary = item.isPrimary;
                const isDup = item.isDuplicate;
                const rowClass = isDup ? 'duplicate-row' : 'hover:bg-slate-700/30';
                const eyeBtn = (isPrimary && item.duplicateCount > 0) ? `
                    <button onclick="toggleGroup('${item.fingerprint}')" class="mr-2 p-1 rounded bg-slate-900 text-indigo-400 hover:text-white transition-colors" title="Show ${item.duplicateCount} similar URLs">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                ` : '';

                return `
                    <tr class="${rowClass} transition-colors group">
                        <td class="px-4 py-3 flex items-center">
                            ${eyeBtn}
                            <a href="${item.url}" target="_blank" class="text-indigo-400 hover:text-indigo-300 font-medium truncate block max-w-xs mono text-xs ${isDup ? 'pl-4 italic' : ''}">
                                ${item.url}
                            </a>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <span class="status-badge ${getStatusClass(item.status_code)}">${item.status_code || 'N/A'}</span>
                        </td>
                        <td class="px-4 py-3 text-slate-400 truncate max-w-xs">${item.title || '—'}</td>
                        <td class="px-4 py-3 text-slate-400 mono text-xs">${item.content_length !== undefined ? item.content_length.toLocaleString() : '—'}</td>
                        <td class="px-4 py-3 text-slate-400">${item.webserver || '—'}</td>
                        <td class="px-4 py-3">
                            <div class="flex flex-wrap gap-1 max-w-xs">
                                ${(item.tech || []).map(t => `<span class="bg-slate-900 text-slate-400 text-[10px] px-1.5 py-0.5 rounded border border-slate-700">${t}</span>`).join('') || '—'}
                            </div>
                        </td>
                        <td class="px-4 py-3 text-slate-500 truncate max-w-xs mono text-xs">${item.final_url || '—'}</td>
                    </tr>
                `;
            }).join('');

            // PASS displayList to update stats based on what's visible
            updateStats(displayList);
        };

        const applyFilters = () => {
            const search = elements.searchBox.value.toLowerCase();
            const tech = elements.techFilter.value;
            const minLength = parseInt(elements.lengthFilter.value) || 1;
            const allowedStatuses = Array.from(elements.statusChecks)
                                         .filter(i => i.checked)
                                         .map(i => i.value);

            filteredData = allData.filter(item => {
                const textMatch = !search || 
                    item.url?.toLowerCase().includes(search) || 
                    item.title?.toLowerCase().includes(search) || 
                    item.webserver?.toLowerCase().includes(search) || 
                    (item.tech && item.tech.join(' ').toLowerCase().includes(search));
                
                const techMatch = tech === 'all' || (item.tech && item.tech.includes(tech));
                const lengthMatch = (item.content_length || 0) >= minLength;
                
                const statusStr = (item.status_code || "").toString();
                const firstDigit = statusStr[0];
                const statusMatch = allowedStatuses.some(val => {
                    if (val.length === 1) return firstDigit === val; 
                    return statusStr === val; 
                });

                return textMatch && techMatch && lengthMatch && statusMatch;
            });

            if (currentSort.key) {
                sortData(currentSort.key, currentSort.direction);
            } else {
                renderTable();
            }
        };

        const sortData = (key, direction) => {
            filteredData.sort((a, b) => {
                let valA = a[key] ?? '';
                let valB = b[key] ?? '';
                if (typeof valA === 'number' && typeof valB === 'number') {
                    return direction === 'asc' ? valA - valB : valB - valA;
                }
                valA = valA.toString().toLowerCase();
                valB = valB.toString().toLowerCase();
                if (valA < valB) return direction === 'asc' ? -1 : 1;
                if (valA > valB) return direction === 'asc' ? 1 : -1;
                return 0;
            });
            renderTable();
        };

        const initializeDashboard = (data) => {
            allData = data;
            filteredData = [...allData];
            const techSet = new Set();
            allData.forEach(item => {
                if (item.tech && Array.isArray(item.tech)) item.tech.forEach(t => techSet.add(t));
            });
            elements.techFilter.innerHTML = '<option value="all">All Technologies</option>' + 
                Array.from(techSet).sort().map(t => `<option value="${t}">${t}</option>`).join('');
            elements.inputArea.classList.add('fade-out');
            setTimeout(() => {
                elements.inputArea.classList.add('hidden');
                elements.sections.stats.classList.remove('hidden');
                elements.sections.filters.classList.remove('hidden');
                elements.sections.table.classList.remove('hidden');
                elements.btnNewUpload.classList.remove('hidden');
                applyFilters();
            }, 300);
        };

        const resetToUpload = () => {
            elements.sections.stats.classList.add('hidden');
            elements.sections.filters.classList.add('hidden');
            elements.sections.table.classList.add('hidden');
            elements.btnNewUpload.classList.add('hidden');
            elements.inputArea.classList.remove('hidden');
            setTimeout(() => {
                elements.inputArea.classList.remove('fade-out');
                elements.inputArea.classList.add('fade-in');
            }, 10);
        };

        elements.btnProcess.addEventListener('click', () => {
            const data = parseInput(elements.textInput.value);
            if (data.length) initializeDashboard(data);
        });

        elements.btnNewUpload.addEventListener('click', resetToUpload);
        
        elements.btnDedup.addEventListener('click', () => {
            isDedupEnabled = !isDedupEnabled;
            elements.btnDedup.classList.toggle('bg-indigo-600');
            elements.btnDedup.classList.toggle('text-white');
            elements.btnDedup.classList.toggle('bg-slate-700');
            renderTable();
        });

        elements.dropZone.addEventListener('click', () => elements.fileInput.click());
        elements.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => initializeDashboard(parseInput(ev.target.result));
            reader.readAsText(file);
        });
        elements.dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            elements.dropZone.classList.add('border-indigo-500', 'bg-slate-800');
        });
        elements.dropZone.addEventListener('dragleave', () => {
            elements.dropZone.classList.remove('border-indigo-500', 'bg-slate-800');
        });
        elements.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            elements.dropZone.classList.remove('border-indigo-500', 'bg-slate-800');
            const file = e.dataTransfer.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => initializeDashboard(parseInput(ev.target.result));
            reader.readAsText(file);
        });

        elements.searchBox.addEventListener('input', applyFilters);
        elements.lengthFilter.addEventListener('input', applyFilters);
        elements.techFilter.addEventListener('change', applyFilters);
        elements.statusChecks.forEach(check => check.addEventListener('change', applyFilters));

        document.querySelectorAll('.sort-header').forEach(header => {
            header.addEventListener('click', () => {
                const key = header.getAttribute('data-sort');
                const icon = header.querySelector('.sort-icon');
                if (currentSort.key === key) {
                    currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort.key = key;
                    currentSort.direction = 'asc';
                }
                document.querySelectorAll('.sort-icon').forEach(i => i.classList.add('opacity-0'));
                icon.classList.remove('opacity-0');
                icon.textContent = currentSort.direction === 'asc' ? '↑' : '↓';
                sortData(key, currentSort.direction);
